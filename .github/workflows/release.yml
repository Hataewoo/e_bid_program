name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build NSIS · publish GitHub Release
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint · test · regression gate · build
        run: npm run build:check

      - name: Prepare packaging (Prisma · template DB)
        run: npm run prepare:packaging

      - name: Build installer and publish to GitHub Releases
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub Release is public (not draft)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $api = "https://api.github.com/repos/Hataewoo/e_bid_program/releases/tags/$tag"
          $release = Invoke-RestMethod -Uri $api -Headers @{ "User-Agent" = "release-workflow" }
          if ($release.draft) {
            Write-Error "Release $tag is still a draft. Set build.publish.releaseType to release in package.json."
            exit 1
          }
          if ($release.assets.Count -lt 2) {
            Write-Error "Release $tag has too few assets ($($release.assets.Count)). Expected Setup exe, blockmap, and latest.yml."
            exit 1
          }
          Write-Host "Release $tag is public with $($release.assets.Count) asset(s)."

      - name: Verify packaging artifacts
        run: node scripts/verify-packaging.mjs

      - name: Upload release artifacts (workflow summary)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
