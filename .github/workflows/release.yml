name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build NSIS · publish GitHub Release
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Create .env for Prisma postinstall
        run: copy .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Lint · test · regression gate · build
        run: npm run build:check

      - name: Prepare packaging (Prisma · template DB)
        run: npm run prepare:packaging

      - name: Remove existing GitHub Release for this tag (draft or stale)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "User-Agent" = "release-workflow"
          }
          $uri = "https://api.github.com/repos/Hataewoo/e_bid_program/releases?per_page=100"
          $releases = Invoke-RestMethod -Uri $uri -Headers $headers
          foreach ($release in $releases) {
            if ($release.tag_name -eq $tag) {
              Write-Host "Deleting release id=$($release.id) draft=$($release.draft) assets=$($release.assets.Count)"
              Invoke-RestMethod -Method DELETE -Uri "https://api.github.com/repos/Hataewoo/e_bid_program/releases/$($release.id)" -Headers $headers
            }
          }

      - name: Build installer and publish to GitHub Releases
        run: npx electron-builder --win --x64 --publish always
        env:
          EP_GH_IGNORE_TIME: true

      - name: Verify GitHub Release is public (not draft)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "User-Agent" = "release-workflow"
          }
          $api = "https://api.github.com/repos/Hataewoo/e_bid_program/releases/tags/$tag"
          $release = Invoke-RestMethod -Uri $api -Headers $headers
          if ($release.draft) {
            Write-Error "Release $tag is still a draft after publish."
            exit 1
          }
          $names = ($release.assets | ForEach-Object { $_.name }) -join ", "
          Write-Host "Assets: $names"
          if ($release.assets.Count -lt 2) {
            Write-Error "Release $tag has too few assets ($($release.assets.Count))."
            exit 1
          }
          $hasSetup = $release.assets | Where-Object { $_.name -like "*Setup*.exe" }
          $hasYml = $release.assets | Where-Object { $_.name -like "latest*.yml" }
          if (-not $hasSetup -or -not $hasYml) {
            Write-Error "Release $tag is missing Setup exe or latest.yml."
            exit 1
          }
          Write-Host "Release $tag is public with $($release.assets.Count) asset(s)."

      - name: Verify packaging artifacts
        run: node scripts/verify-packaging.mjs

      - name: Upload release artifacts (workflow summary)
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-${{ github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
